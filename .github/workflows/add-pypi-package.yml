name: Add PyPI Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'PyPI package name'
        required: true
      version:
        description: 'Version (leave empty for latest)'
        required: false

jobs:
  add-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download wheel from PyPI
        env:
          PKG_NAME: ${{ github.event.inputs.package }}
          PKG_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$PKG_VERSION" ]; then
            python3 scripts/add-pypi-package.py "$PKG_NAME" "$PKG_VERSION"
          else
            python3 scripts/add-pypi-package.py "$PKG_NAME"
          fi

      - name: Rebuild index
        run: python3 scripts/build-index.py

      - name: Commit and push
        env:
          PKG_NAME: ${{ github.event.inputs.package }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add $PKG_NAME from PyPI"
          git push
